name: Facebook Automation Post

on:
  schedule:
    # Monday-Thursday at 12:00 PM UTC (8:00 PM PHT)
    - cron: '0 12 * * 1-4'
    # Friday at 6:00 PM UTC (2:00 AM+1 PHT)
    - cron: '0 18 * * 5'
    # Saturday at 10:00 AM UTC (6:00 PM PHT)
    - cron: '0 10 * * 6'
    # Sunday at 8:00 AM UTC (4:00 PM PHT)
    - cron: '0 8 * * 0'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Facebook automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: |
          python main.py
